# Use environment variable or .env file to store sensitive information
# Switch environments with DB_ENV=local (default) or DB_ENV=hetzner
[app]
name = "turtle-backtest"
debug = true
eodhd.api_key = "YOUR_EODHD_API_KEY"

[database.local]
host = "localhost"
port = 5432
dbname = "trading"
user = "app_user"

[database.hetzner]
host = "hetzner"
port = 5432
dbname = "trading"
user = "app_user"

[database.pool]
min_size = 10
max_size = 30
max_idle = 300
max_lifetime = 3600
timeout = 30
